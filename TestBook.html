<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management System</title>
    <!-- ប្រើប្រាស់ Tailwind CSS សម្រាប់ Design -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">📚 គ្រប់គ្រងសៀវភៅ (Book Management)</h1>

        <div class="flex flex-wrap -mx-4">
            <!-- ផ្នែក Form បញ្ចូល និងកែប្រែទិន្នន័យ -->
            <div class="w-full lg:w-1/3 px-4 mb-8">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-700" id="formTitle">បន្ថែមសៀវភៅថ្មី</h2>
                    <form id="bookForm" onsubmit="saveBook(event)">
                        <input type="hidden" id="bookId" value="0">
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">ចំណងជើង (Title)</label>
                            <input type="text" id="title" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">អ្នកនិពន្ធ (Author)</label>
                            <input type="text" id="author" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div class="mb-6">
                            <label class="block text-gray-700 text-sm font-bold mb-2">ថ្ងៃបោះពុម្ព (Publish Date)</label>
                            <input type="date" id="publishDate" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div class="flex items-center justify-between">
                            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-150">
                                រក្សាទុក (Save)
                            </button>
                        </div>
                        <div class="mt-2 text-center">
                            <button type="button" onclick="resetForm()" class="text-sm text-gray-500 hover:text-gray-800 hidden" id="cancelBtn">
                                បោះបង់ (Cancel)
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- ផ្នែកតារាងបង្ហាញទិន្នន័យ -->
            <div class="w-full lg:w-2/3 px-4">
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <table class="min-w-full leading-normal">
                        <thead>
                            <tr>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ID</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ចំណងជើង</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">អ្នកនិពន្ធ</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">ថ្ងៃបោះពុម្ព</th>
                                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">សកម្មភាព</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody">
                            <!-- ទិន្នន័យនឹងត្រូវបានបញ្ចូលទីនេះដោយ JavaScript -->
                        </tbody>
                    </table>
                    
                    <!-- ផ្នែក Pagination -->
                    <div class="px-5 py-3 bg-white border-t flex flex-col xs:flex-row items-center xs:justify-between">
                        <span class="text-xs xs:text-sm text-gray-900" id="pageInfo">
                            បង្ហាញសៀវភៅទី 1 ដល់ 5 នៃសៀវភៅសរុប 0
                        </span>
                        <div class="inline-flex mt-2 xs:mt-0" id="paginationButtons">
                            <!-- ប៊ូតុងទំព័រនឹងលោតចេញមកទីនេះដោយ JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // សូមកុំភ្លេចដូរ Port ខាងក្រោមនេះ ឲ្យត្រូវទៅនឹង Port របស់ ASP.NET របស់អ្នក (ឧទាហរណ៍ https://localhost:7027)
        const API_URL = 'http://localhost:5079/api/book'; 
        let currentBooks = [];
        
        // អថេរសម្រាប់ Pagination
        let currentPage = 1;
        const rowsPerPage = 5;

        document.addEventListener('DOMContentLoaded', fetchBooks);

        async function fetchBooks() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    currentBooks = await response.json();
                    renderTable();
                } else {
                    console.error('Failed to fetch books');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert("មិនអាចទាក់ទងទៅកាន់ API បានទេ។ សូមពិនិត្យមើល CORS ឬ URL។");
            }
        }

        function renderTable() {
            const tbody = document.getElementById('booksTableBody');
            tbody.innerHTML = '';

            // គណនា Index សម្រាប់ Pagination
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const paginatedBooks = currentBooks.slice(startIndex, endIndex);

            paginatedBooks.forEach(book => {
                const dateObj = new Date(book.publishDate);
                const formattedDate = dateObj.toLocaleDateString(); 

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap">${book.bookId}</p>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap font-semibold">${book.title}</p>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap">${book.author}</p>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap">${formattedDate}</p>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center">
                        <button onclick="editBook(${book.bookId})" class="text-blue-600 hover:text-blue-900 mx-2">កែប្រែ</button>
                        <button onclick="deleteBook(${book.bookId})" class="text-red-600 hover:text-red-900 mx-2">លុប</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            setupPagination();
        }

        function setupPagination() {
            const pageCount = Math.ceil(currentBooks.length / rowsPerPage);
            const paginationContainer = document.getElementById('paginationButtons');
            const pageInfo = document.getElementById('pageInfo');
            
            paginationContainer.innerHTML = ''; 

            const startCount = currentBooks.length === 0 ? 0 : ((currentPage - 1) * rowsPerPage) + 1;
            const endCount = Math.min(currentPage * rowsPerPage, currentBooks.length);
            pageInfo.innerText = `បង្ហាញសៀវភៅទី ${startCount} ដល់ ${endCount} នៃសៀវភៅសរុប ${currentBooks.length}`;

            const prevBtn = document.createElement('button');
            prevBtn.innerText = 'មុន';
            prevBtn.className = `text-sm bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-l ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            };
            paginationContainer.appendChild(prevBtn);

            const nextBtn = document.createElement('button');
            nextBtn.innerText = 'បន្ទាប់';
            nextBtn.className = `text-sm bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-r ${currentPage === pageCount || pageCount === 0 ? 'opacity-50 cursor-not-allowed' : ''}`;
            nextBtn.disabled = currentPage === pageCount || pageCount === 0;
            nextBtn.onclick = () => {
                if (currentPage < pageCount) {
                    currentPage++;
                    renderTable();
                }
            };
            paginationContainer.appendChild(nextBtn);
        }

        async function saveBook(event) {
            event.preventDefault(); 

            const id = parseInt(document.getElementById('bookId').value);
            const bookData = {
                bookId: id,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                publishDate: document.getElementById('publishDate').value
            };

            const isUpdating = id !== 0;
            const method = isUpdating ? 'PUT' : 'POST';
            const url = isUpdating ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookData)
                });

                if (response.ok) {
                    resetForm();
                    fetchBooks(); 
                } else {
                    alert('មានបញ្ហាក្នុងការរក្សាទុកទិន្នន័យ។');
                }
            } catch (error) {
                console.error('Error saving book:', error);
            }
        }

        function editBook(id) {
            const book = currentBooks.find(b => b.bookId === id);
            if (book) {
                document.getElementById('formTitle').innerText = 'កែប្រែសៀវភៅ';
                document.getElementById('bookId').value = book.bookId;
                document.getElementById('title').value = book.title;
                document.getElementById('author').value = book.author;
                
                const date = new Date(book.publishDate);
                const dateString = date.toISOString().split('T')[0];
                document.getElementById('publishDate').value = dateString;

                document.getElementById('cancelBtn').classList.remove('hidden');
            }
        }

        async function deleteBook(id) {
            if (confirm('តើអ្នកពិតជាចង់លុបសៀវភៅនេះមែនទេ?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        fetchBooks();
                    } else {
                        alert('មិនអាចលុបបានទេ។');
                    }
                } catch (error) {
                    console.error('Error deleting book:', error);
                }
            }
        }

        function resetForm() {
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '0';
            document.getElementById('formTitle').innerText = 'បន្ថែមសៀវភៅថ្មី';
            document.getElementById('cancelBtn').classList.add('hidden');
        }
    </script>
</body>
</html>
